[package]
name = "gistui"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "A terminal UI for managing GitHub Gists"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
dirs = "5"
ratatui = "0.26"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
similar = "2"
toml = "1.1"

[dev-dependencies]
tempfile = "3"
