name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          BIN="target/${TARGET}/release/gistui"
          PKG="gistui-${REF_NAME}-${TARGET}"
          mkdir "$PKG"
          cp "$BIN" "$PKG/"
          cp README.md LICENSE "$PKG/"
          tar -czf "${PKG}.tar.gz" "$PKG"
          shasum -a 256 "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256"
          echo "ASSET=${PKG}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          $bin = "target\${env:TARGET}\release\gistui.exe"
          $pkg = "gistui-${env:REF_NAME}-${env:TARGET}"
          New-Item -ItemType Directory $pkg
          Copy-Item $bin, README.md, LICENSE $pkg\
          Compress-Archive -Path $pkg -DestinationPath "${pkg}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "${pkg}.zip").Hash.ToLower()
          # Write LF-terminated (no CRLF, no BOM) so `sha256sum -c` under Git Bash
          # doesn't see a trailing CR glued to the filename.
          [System.IO.File]::WriteAllText("$pwd/${pkg}.zip.sha256", "$hash  ${pkg}.zip`n")
          "ASSET=${pkg}.zip" | Out-File -Append $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true

      - name: Update Scoop manifest
        env:
          HOMEBREW_BUMP_TOKEN: ${{ secrets.HOMEBREW_BUMP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: scripts/release/update-scoop-manifest.sh

      - name: Update Homebrew formula
        env:
          HOMEBREW_BUMP_TOKEN: ${{ secrets.HOMEBREW_BUMP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: scripts/release/update-homebrew-formula.sh
